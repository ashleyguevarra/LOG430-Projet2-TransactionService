services:
  jaeger:
    image: 'jaegertracing/all-in-one:1.76.0'
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    ports:
      - '${JAEGER_UI_PORT:-16686}:16686'
      - '${OTLP_HTTP_PORT:-4318}:4318'
  # Kafka-compatible broker (API = Kafka). Port 9093 matches spring.kafka.bootstrap-servers default.
  kafka:
    image: 'docker.redpanda.com/redpandadata/redpanda:v24.3.11'
    hostname: kafka
    command:
      - redpanda
      - start
      - --mode
      - dev-container
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:9093
      - --advertise-kafka-addr
      - internal://kafka:9092,external://localhost:9093
    ports:
      - '${KAFKA_PORT:-9093}:9093'
  mysql:
    image: 'mysql:latest'
    environment:
      - 'MYSQL_DATABASE=${MYSQL_DATABASE:-transaction-db}'
      - 'MYSQL_PASSWORD=${MYSQL_PASSWORD:-secret}'
      - 'MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-secret}'
      - 'MYSQL_USER=${MYSQL_USER:-myuser}'
    volumes:
      - './db_init:/docker-entrypoint-initdb.d'
    ports:
      - '${MYSQL_PORT:-3307}:3306'
