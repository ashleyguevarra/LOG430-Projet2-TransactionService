spring:
  application:
    name: transaction
  datasource:
    url: jdbc:mysql://localhost:${MYSQL_PORT:3307}/${MYSQL_DATABASE:transaction-db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:myuser}
    password: ${MYSQL_PASSWORD:secret}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
    consumer:
      group-id: transaction-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: 8081
  error:
    include-message: always
    include-binding-errors: always

# Actuator minimal pour dev local / tests. Métriques, Prometheus, traces OTLP :
# voir LOG430-Projet2-Infra/deployement/transaction-service/application.yaml (monté en Docker).
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# Format des logs : logback-spring.xml (JSON par défaut). Profil lisible : -Dspring-boot.run.profiles=human
logging:
  level:
    projet2.banks.transaction: DEBUG

